<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Moody Pet: Forbidden Ascension</title>

<meta name="x-ogp-key" content="9063cd14-6bfe-4820-964a-0194b9ac0569">
<script src="https://sdk.play.fun/opus.js"></script>

<style>
html,body{
 margin:0;
 overflow:hidden;
 background:#050510;
 font-family:system-ui;
 color:white;
}
#ui{
 position:fixed;
 top:15px;
 left:15px;
 z-index:10;
}
button{
 background:#ffcc00;
 border:none;
 padding:8px 14px;
 border-radius:12px;
 font-weight:bold;
 cursor:pointer;
}
canvas{display:block;}
#flashText{
 position:fixed;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 font-size:60px;
 font-weight:bold;
 opacity:0;
 pointer-events:none;
 text-align:center;
}
</style>
</head>
<body>

<div id="ui">
 <div id="pts">pts: 0</div>
 <div id="stage">Stage: 1</div>
 <button onclick="boost()">BOOST</button>
</div>

<div id="flashText"></div>
<canvas id="c"></canvas>

<script>
let pf=null;
window.onload=()=>{
 if(window.Opus){
   pf=new Opus({widgets:{points:true}});
 }
};

const c=document.getElementById("c");
const ctx=c.getContext("2d");

function resize(){
 c.width=window.innerWidth;
 c.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let score=0;
let buffer=0;
let stage=1;
let boostT=0;
let t=0;

let x=c.width/2;
let y=c.height/2;
let vx=0, vy=0;

let particles=[];
let laserLife=0;
let forbidden=false;
let forbiddenTimer=0;

let mouseX=c.width/2;
let mouseY=c.height/2;

document.addEventListener("mousemove",e=>{
 mouseX=e.clientX;
 mouseY=e.clientY;
});

function getStage(){
 if(score>=50000) return 5;
 if(score>=15000) return 4;
 if(score>=3000) return 3;
 if(score>=500) return 2;
 return 1;
}

function boost(){
 boostT=600;
}

document.addEventListener("click",()=>{
 score+=5*stage;

 if(stage===5 && !forbidden){
   if(Math.random()<0.01){
     activateForbidden();
   } else {
     chaosBurst();
     laserLife=20;
   }
 }
});

function activateForbidden(){
 forbidden=true;
 forbiddenTimer=600;
 flash("YOU WENT TOO FAR");
}

function flash(text){
 const el=document.getElementById("flashText");
 el.innerText=text;
 el.style.opacity=1;
 setTimeout(()=>{ el.style.opacity=0; },800);
}

function chaosBurst(){
 for(let i=0;i<30;i++){
   particles.push({
     x:x,
     y:y,
     vx:(Math.random()-0.5)*10,
     vy:(Math.random()-0.5)*10,
     life:60
   });
 }
}

function loop(){
 requestAnimationFrame(loop);
 t++;

 stage=getStage();

 let earn=0.05*stage;

 if(stage===5) earn*=12;
 if(forbidden) earn*=25;

 if(boostT>0){
   earn*=2;
   boostT--;
 }

 score+=earn;
 buffer+=earn;

 if(buffer>=10){
   if(pf && typeof pf.addPoints==="function"){
     pf.addPoints(10);
   }
   buffer=0;
 }

 document.getElementById("pts").innerText="pts: "+Math.floor(score);
 document.getElementById("stage").innerText=
   forbidden ? "Stage: 6 — FORBIDDEN" : "Stage: "+stage;

 ctx.clearRect(0,0,c.width,c.height);

 // Background
 if(forbidden){
   ctx.fillStyle="black";
 } else if(stage===5){
   ctx.fillStyle=`hsl(${t%360},100%,8%)`;
 } else {
   ctx.fillStyle="#050510";
 }
 ctx.fillRect(0,0,c.width,c.height);

 // Forbidden gravity pull effect
 if(forbidden){
   let dx=mouseX-x;
   let dy=mouseY-y;
   vx+=dx*0.0005;
   vy+=dy*0.0005;

   forbiddenTimer--;
   if(forbiddenTimer<=0){
     forbidden=false;
   }
 }

 // Movement physics
 x+=vx;
 y+=vy;
 vx*=0.95;
 vy*=0.95;

 x=Math.max(100,Math.min(c.width-100,x));
 y=Math.max(100,Math.min(c.height-100,y));

 let r=60+stage*20+Math.sin(t*0.1)*8;

 // Body
 ctx.beginPath();
 ctx.arc(x,y,r,0,Math.PI*2);
 ctx.fillStyle=forbidden
   ? "#111"
   : ["#ffd166","#06d6a0","#00b4d8","#7209b7","#ffffff"][stage-1];
 ctx.shadowBlur=forbidden?80:(stage===5?50:0);
 ctx.shadowColor=forbidden?"red":"cyan";
 ctx.fill();
 ctx.shadowBlur=0;

 // Eyes
 let eyeColor=forbidden?"red":(stage===5?"cyan":"#000");
 ctx.fillStyle=eyeColor;
 ctx.beginPath();
 ctx.arc(x-r/3,y-r/5,15,0,Math.PI*2);
 ctx.arc(x+r/3,y-r/5,15,0,Math.PI*2);
 ctx.fill();

 // Mouth
 ctx.strokeStyle=eyeColor;
 ctx.lineWidth=4;
 ctx.beginPath();
 ctx.arc(x,y+r/4,30+stage*5,0,Math.PI);
 ctx.stroke();
 ctx.lineWidth=1;

 // Laser
 if(laserLife>0){
   ctx.strokeStyle="red";
   ctx.lineWidth=4;
   ctx.beginPath();
   ctx.moveTo(x,y);
   ctx.lineTo(mouseX,mouseY);
   ctx.stroke();
   laserLife--;
 }

 // Particles
 particles.forEach(p=>{
   p.x+=p.vx;
   p.y+=p.vy;
   p.life--;
   ctx.fillStyle="white";
   ctx.fillRect(p.x,p.y,3,3);
 });
 particles=particles.filter(p=>p.life>0);
}

loop();
</script>
</body>
</html>
