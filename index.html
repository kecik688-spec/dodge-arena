<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Moody Pet: Chaos Ascension</title>

<meta name="x-ogp-key" content="9063cd14-6bfe-4820-964a-0194b9ac0569">
<script src="https://sdk.play.fun/opus.js"></script>

<style>
html,body{
 margin:0;
 overflow:hidden;
 background:#050510;
 font-family:system-ui;
 color:white;
}
#ui{
 position:fixed;
 top:15px;
 left:15px;
 z-index:10;
}
button{
 background:#ffcc00;
 border:none;
 padding:8px 14px;
 border-radius:12px;
 font-weight:bold;
 cursor:pointer;
}
canvas{display:block;}
#flashText{
 position:fixed;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 font-size:60px;
 font-weight:bold;
 opacity:0;
 pointer-events:none;
}
</style>
</head>
<body>

<div id="ui">
 <div id="pts">pts: 0</div>
 <div id="stage">Stage: 1</div>
 <button onclick="boost()">BOOST</button>
</div>

<div id="flashText">YOU MADE ME</div>
<canvas id="c"></canvas>

<script>
let pf=null;
window.onload=()=>{
 if(window.Opus) pf=new Opus({widgets:{points:true}});
};

const c=document.getElementById("c");
const ctx=c.getContext("2d");
function resize(){c.width=innerWidth;c.height=innerHeight}
resize();onresize=resize;

let score=0, buffer=0;
let stage=1;
let boostT=0;
let t=0;

let x=c.width/2;
let y=c.height/2;
let vx=0, vy=0;
let shake=0;
let laser=null;

function getStage(){
 if(score>=50000) return 5;
 if(score>=15000) return 4;
 if(score>=3000) return 3;
 if(score>=500) return 2;
 return 1;
}

function boost(){ boostT=600; }

document.onclick=()=>{
 score+=5*stage;
 if(stage==5){
   vx=(Math.random()-0.5)*20;
   vy=(Math.random()-0.5)*20;
   shake=20;
   spawnLaser();
 }
};

function spawnLaser(){
 laser={
   x:x,
   y:y,
   life:40
 };
}

function loop(){
 requestAnimationFrame(loop);
 t++;
 stage=getStage();

 let earn=0.05*stage;
 if(stage==5) earn*=10;
 if(boostT>0){earn*=2;boostT--;}
 score+=earn;
 buffer+=earn;

 if(buffer>=10){
   if(pf) pf.addPoints(10);
   buffer=0;
 }

 document.getElementById("pts").innerText="pts: "+Math.floor(score);
 document.getElementById("stage").innerText="Stage: "+stage;

 let offsetX=0, offsetY=0;
 if(shake>0){
   offsetX=(Math.random()-0.5)*shake;
   offsetY=(Math.random()-0.5)*shake;
   shake-=1;
 }

 ctx.clearRect(0,0,c.width,c.height);

 // CHAOS BACKGROUND
 if(stage==5){
   ctx.fillStyle=`hsl(${t%360},100%,10%)`;
   ctx.fillRect(0,0,c.width,c.height);

   if(Math.random()<0.01){
     document.getElementById("flashText").style.opacity=1;
     setTimeout(()=>document.getElementById("flashText").style.opacity=0,300);
   }
 } else {
   ctx.fillStyle="#050510";
   ctx.fillRect(0,0,c.width,c.height);
 }

 x+=vx;
 y+=vy;
 vx*=0.95;
 vy*=0.95;

 if(x<100||x>c.width-100) vx*=-1;
 if(y<100||y>c.height-100) vy*=-1;

 let r=60+stage*20+Math.sin(t*0.1)*8;

 ctx.beginPath();
 ctx.arc(x+offsetX,y+offsetY,r,0,Math.PI*2);

 ctx.fillStyle=[
   "#ffd166",
   "#06d6a0",
   "#00b4d8",
   "#7209b7",
   "#ffffff"
 ][stage-1];

 ctx.shadowBlur= stage==5 ? 40 : 0;
 ctx.shadowColor="cyan";
 ctx.fill();
 ctx.shadowBlur=0;

 // Eyes
 ctx.fillStyle= stage==5 ? "cyan" : "#000";
 ctx.beginPath();
 ctx.arc(x-r/3+offsetX,y-r/5+offsetY,15,0,Math.PI*2);
 ctx.arc(x+r/3+offsetX,y-r/5+offsetY,15,0,Math.PI*2);
 ctx.fill();

 // Mouth
 ctx.strokeStyle="#000";
 ctx.lineWidth=4;
 ctx.beginPath();
 ctx.arc(x+offsetX,y+r/4+offsetY,30+stage*5,0,Math.PI);
 ctx.stroke();

 // LASER
 if(laser){
   ctx.strokeStyle="red";
   ctx.lineWidth=6;
   ctx.beginPath();
   ctx.moveTo(laser.x,laser.y);
   ctx.lineTo(c.width/2,c.height);
   ctx.stroke();

   laser.life--;
   if(laser.life<=0) laser=null;
 }

}
loop();
</script>
</body>
</html>
